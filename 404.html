<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada · Fluvian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#05101b;color:#faf7f0;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
        .num{font-family:'Cormorant Garamond',serif;font-size:clamp(6rem,20vw,12rem);font-weight:300;color:#22a698;line-height:1;opacity:.6}
        h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,4vw,2.5rem);font-weight:300;margin:1.5rem 0;color:#faf7f0}
        p{font-size:.9rem;opacity:.7;max-width:380px;line-height:1.8;margin-bottom:2.5rem}
        a{display:inline-block;padding:.85rem 2.5rem;border:1px solid #22a698;color:#89dbd3;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;text-decoration:none;transition:background .3s}
        a:hover{background:rgba(34,166,152,.15)}
    </style>
</head>
<body>
    <p class="num">404</p>
    <h1>Esta página no existe</h1>
    <p>El agua siempre encuentra su camino. Esta URL, no.</p>
    <a href="/">Volver al inicio</a>
</body>
</html>
